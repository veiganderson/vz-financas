<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vz Finanças</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen">
  <div class="login-container">
    <h1>Vz Finanças</h1>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>

    <div id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="screen" style="display:none;">

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-container">
      <span>Vz Finanças</span>
      <div>
        <span id="userEmail"></span>
        <button onclick="logout()">Sair</button>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- RESUMO -->
    <div class="summary-cards">
      <div class="card">
        <p>Receitas</p>
        <h3 id="totalIncome">R$ 0</h3>
      </div>
      <div class="card">
        <p>Despesas</p>
        <h3 id="totalExpense">R$ 0</h3>
      </div>
      <div class="card">
        <p>Saldo</p>
        <h3 id="balance">R$ 0</h3>
      </div>
    </div>

    <!-- FORM -->
    <div class="section">
      <h2>Nova Transação</h2>

      <form id="transactionForm">

        <input type="text" id="title" placeholder="Descrição" required>

        <input type="number" id="amount" placeholder="Valor" step="0.01" required>

        <select id="type">
          <option value="income">Receita</option>
          <option value="expense">Despesa</option>
        </select>

        <!-- NOVOS CAMPOS -->
        <select id="category">
          <option value="">Sem categoria</option>
          <option value="Alimentação">Alimentação</option>
          <option value="Transporte">Transporte</option>
          <option value="Moradia">Moradia</option>
        </select>

        <input type="number" id="installments" value="1" min="1">

        <label>
          <input type="checkbox" id="isRecurring">
          Recorrente
        </label>

        <button type="submit">Adicionar</button>
      </form>
    </div>

    <!-- LISTA -->
    <div class="section">

      <div class="section-header">
        <h2>Transações</h2>

        <!-- FILTRO MÊS -->
        <div>
          <button onclick="changeMonth(-1)">←</button>
          <span id="currentMonth"></span>
          <button onclick="changeMonth(1)">→</button>
        </div>

        <!-- FILTRO TIPO -->
        <select id="filterType">
          <option value="all">Todas</option>
          <option value="income">Receitas</option>
          <option value="expense">Despesas</option>
        </select>

      </div>

      <div id="transactionsList"></div>

    </div>

  </div>
</div>

<!-- LOADING -->
<div id="loadingOverlay" style="display:none;">Carregando...</div>

<!-- SCRIPTS -->
<script src="config.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
