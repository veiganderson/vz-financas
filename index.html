<!DOCTYPE html>
<html>
<head>
  <title>Vz Finanças</title>
</head>
<body>

<h1>Vz Finanças</h1>

<h2>Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>

<h2>Nova Transação</h2>
<input id="title" placeholder="Descrição"><br>
<input id="amount" placeholder="Valor"><br>
<button onclick="addTransaction()">Salvar</button>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://wmfegtjgfvlnvyepgivd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtZmVndGpnZnZsbnZ5ZXBnaXZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjg4OTYsImV4cCI6MjA5MjYwNDg5Nn0.ZwEbMCaDcblBrz1-TfINCzJonjmjVh--EXKCk24uQzs'
)

window.login = async () => {
  const { error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('email').value,
    password: document.getElementById('password').value
  })

  alert(error ? error.message : "Logado com sucesso")
}

window.addTransaction = async () => {
  const { data: { user } } = await supabase.auth.getUser()

  if (!user) {
    alert("Faça login primeiro")
    return
  }

  const { error } = await supabase
    .from('transactions')
    .insert({
      user_id: user.id,
      title: document.getElementById('title').value,
      amount: Number(document.getElementById('amount').value),
      type: 'expense'
    })

  alert(error ? error.message : "Salvo com sucesso")
}
</script>

</body>
</html>
