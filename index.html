<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vz Finanças</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen">
  <div class="login-box">
    <h1>Vz Finanças</h1>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Senha" required />
      <button type="submit">Entrar</button>
    </form>

    <div id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="screen hidden">

  <header class="topbar">
    <div>Vz Finanças</div>
    <div class="topbar-right">
      <span id="userEmail"></span>
      <button id="logoutBtn">Sair</button>
    </div>
  </header>

  <main class="container">

    <!-- RESUMO -->
    <section class="grid-3">
      <div class="card">
        <span>Receitas</span>
        <strong id="totalIncome">0</strong>
      </div>

      <div class="card">
        <span>Despesas</span>
        <strong id="totalExpense">0</strong>
      </div>

      <div class="card">
        <span>Saldo</span>
        <strong id="balance">0</strong>
      </div>
    </section>

    <!-- FORM -->
    <section class="section">
      <h2>Nova Transação</h2>

      <form id="transactionForm" class="form-grid">

        <input type="text" id="title" placeholder="Descrição" required />

        <input type="number" id="amount" placeholder="Valor" step="0.01" required />

        <select id="type">
          <option value="income">Receita</option>
          <option value="expense">Despesa</option>
        </select>

        <select id="category">
          <option value="">Categoria</option>
          <option value="Alimentação">Alimentação</option>
          <option value="Transporte">Transporte</option>
          <option value="Moradia">Moradia</option>
        </select>

        <input type="number" id="installments" value="1" min="1" />

        <label class="checkbox">
          <input type="checkbox" id="isRecurring" />
          Recorrente
        </label>

        <button type="submit">Adicionar</button>

      </form>
    </section>

    <!-- LISTA -->
    <section class="section">

      <div class="section-header">
        <h2>Transações</h2>

        <div class="filters">
          <button id="prevMonth">←</button>
          <span id="currentMonth"></span>
          <button id="nextMonth">→</button>

          <select id="filterType">
            <option value="all">Todas</option>
            <option value="income">Receitas</option>
            <option value="expense">Despesas</option>
          </select>
        </div>

      </div>

      <div id="transactionsList"></div>

    </section>

  </main>
</div>

<script src="config.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
